    <ellipse cx="185" cy="222" rx="36" ry="48" fill="#bfdbfe" stroke="#1d4ed8" stroke-width="5"/>
    <path d="M122 194 C132 174 153 174 163 194" fill="none" stroke="#1d4ed8" stroke-width="6" stroke-linecap="round"/>
    <text x="83" y="302" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700" fill="#1e3a5f">Testicule</text>
    <text x="43" y="332" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="600" fill="#64748b">testosteron + spermatozoizi</text>
  </g>
  <g font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700" fill="#0f766e">
    <text x="42" y="36">Feminin</text>
