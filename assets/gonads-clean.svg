<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 480" role="img" aria-labelledby="title desc">
  <title id="title">Schema gonadelor endocrine</title>
  <desc id="desc">Diagramă comparativă cu ovare, uter, testicule și hormonii principali.</desc>
  <rect width="760" height="480" fill="#f8fbff"/>
  <g transform="translate(75 70)">
    <path d="M120 80 C112 138 107 190 148 228 C190 190 184 138 176 80 Z" fill="#fbcfe8" stroke="#be185d" stroke-width="5"/>
    <path d="M120 80 C70 62 48 82 34 120" fill="none" stroke="#be185d" stroke-width="7" stroke-linecap="round"/>
    <path d="M176 80 C226 62 248 82 262 120" fill="none" stroke="#be185d" stroke-width="7" stroke-linecap="round"/>
    <ellipse cx="30" cy="126" rx="28" ry="18" fill="#f9a8d4" stroke="#be185d" stroke-width="4"/>
    <ellipse cx="266" cy="126" rx="28" ry="18" fill="#f9a8d4" stroke="#be185d" stroke-width="4"/>
    <text x="93" y="272" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700" fill="#1e3a5f">Ovare</text>
    <text x="52" y="302" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="600" fill="#64748b">estrogen + progesteron</text>
  </g>
  <g transform="translate(455 72)">
    <path d="M126 54 C108 96 111 151 142 188 C173 151 176 96 158 54 Z" fill="none" stroke="#2563eb" stroke-width="7" stroke-linecap="round"/>
